<!DOCTYPE html>
<html>
<head>
    <title>Smart Healthcare System</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }
        h1 {
            color: green;
        }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }
        button {
            background: green;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<h1>Smart Healthcare System</h1>
<a href="patients.html">View Patient List</a>
<br><br>
<a href="dashboard.html">Go to Dashboard</a>
<h3>Add Patient</h3>

<input type="text" id="name" placeholder="Patient Name">
<input type="number" id="age" placeholder="Age">
<input type="text" id="phone" placeholder="phone Number">
<select id="gender">
    <option value="">Select Gender</option>
    <option>Male</option>
    <option>Female</option>
</select>

<select id="category">
    <option value="">Select Category</option>
    <option>Child</option>
    <option>Elderly</option>
    <option>Adult</option>
</select>
    <input type=""text" id="disease"placeholder="Disease/Health issue">


<button onclick="addPatient()">Add Patient</button>
<p id="message" style="color:green;"></p>
<br><br>


<script>
function addPatient() {

    let name = document.getElementById("name").value;

    if(name === "") {
        alert("Enter name");
        return;
    }
    let Phone =document.getElementById("phone").value;
    let patients = JSON.parse(localStorage.getItem("patients")) || [];

    let patient = {
        name: name,
        age: document.getElementById("age").value,
        gender: document.getElementById("gender").value,
        category: document.getElementById("category").value,
         disease :document.getElementById("disease").value,
         phone:document.getElementById("phone").value
    };

    patients.push(patient);

    localStorage.setItem("patients", JSON.stringify(patients));

    alert("Patient added successfully ✅");
document.getElementById("message").innerText = "Patient added successfully!";
}
</script>

</body>
</html>
